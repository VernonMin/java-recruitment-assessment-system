<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Java 招聘测评系统</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">J</div>
          <div>
            <div class="brand-title">Java 招聘测评系统</div>
            <div class="brand-subtitle">Cloudflare 版 MVP · Pages 自动部署校验</div>
          </div>
        </div>
        <nav class="menu">
          <button data-view="login" class="menu-item active">登录</button>
          <button data-view="candidateHome" class="menu-item">求职者端</button>
          <button data-view="enterpriseHome" class="menu-item">企业端</button>
          <button data-view="questionBank" class="menu-item">题库管理</button>
          <button data-view="assessment" class="menu-item">答题页</button>
          <button data-view="submission" class="menu-item">提交详情</button>
          <button data-view="review" class="menu-item">人工评估</button>
        </nav>
        <div class="sidebar-footer">
          <div id="sessionBadge" class="session-badge">未登录</div>
        </div>
      </aside>

      <main class="content">
        <header class="topbar">
          <div>
            <h1 id="pageTitle">登录</h1>
            <p id="pageDesc">先使用管理员或候选人账号登录系统。</p>
          </div>
          <div class="topbar-actions">
            <button id="loadMeButton" class="ghost-button">刷新当前用户</button>
            <button id="logoutButton" class="ghost-button">退出登录</button>
          </div>
        </header>

        <section id="feedback" class="feedback hidden"></section>

        <section id="loginView" class="view active">
          <div class="panel narrow">
            <h2>账号登录</h2>
            <form id="loginForm" class="stack-form">
              <label>
                <span>账号</span>
                <input name="account" value="admin" autocomplete="username" />
              </label>
              <label>
                <span>密码</span>
                <input name="password" type="password" value="Admin123456!" autocomplete="current-password" />
              </label>
              <button type="submit" class="primary-button">登录</button>
            </form>
            <p class="hint">默认种子账号：`admin / Admin123456!`</p>
          </div>
        </section>

        <section id="candidateHomeView" class="view">
          <div class="panel">
            <div class="panel-header">
              <h2>求职者工作台</h2>
              <button id="loadCampaignsButton" class="ghost-button">刷新我的测评</button>
            </div>
            <div id="candidateSummary" class="meta-strip"></div>
            <div id="candidateCampaignList" class="card-grid"></div>
          </div>
        </section>

        <section id="enterpriseHomeView" class="view">
          <div class="panel">
            <div class="panel-header">
              <h2>企业端工作台</h2>
              <p class="hint">企业端内部按面试官、招聘专员、管理员角色显示对应模块。</p>
            </div>
            <div id="enterpriseSummary" class="meta-strip"></div>
            <div id="enterpriseOverview" class="card-grid"></div>
          </div>
        </section>

        <section id="questionBankView" class="view">
          <div class="panel">
            <div class="panel-header">
              <h2>题库管理</h2>
              <div class="topbar-actions">
                <button id="importPresetQuestionsButton" class="ghost-button">导入示例题目</button>
                <button id="reloadQuestionBankButton" class="ghost-button">刷新题库</button>
              </div>
            </div>
            <form id="questionForm" class="stack-form">
              <div class="form-columns">
                <label>
                  <span>题型</span>
                  <select name="type">
                    <option value="single_choice">单选题</option>
                    <option value="multiple_choice">多选题</option>
                    <option value="true_false">判断题</option>
                    <option value="fill_blank">填空题</option>
                    <option value="short_answer">简答题</option>
                    <option value="scenario_answer">场景分析题</option>
                  </select>
                </label>
                <label>
                  <span>状态</span>
                  <select name="status">
                    <option value="draft">草稿</option>
                    <option value="published">已发布</option>
                  </select>
                </label>
              </div>
              <label>
                <span>题干</span>
                <textarea name="stem" placeholder="输入题干"></textarea>
              </label>
              <div class="form-columns">
                <label>
                  <span>分值</span>
                  <input name="score" type="number" value="10" min="0" />
                </label>
                <label>
                  <span>难度</span>
                  <input name="difficulty" type="number" value="3" min="1" max="5" />
                </label>
              </div>
              <label>
                <span>选项</span>
                <textarea name="options" placeholder="每行一个选项，格式：A|选项内容"></textarea>
              </label>
              <label>
                <span>标准答案</span>
                <input name="answer" placeholder="例如：B 或 A,B" />
              </label>
              <label>
                <span>解析</span>
                <textarea name="analysis" placeholder="输入题目解析，可选"></textarea>
              </label>
              <button type="submit" class="primary-button">创建题目</button>
            </form>
            <p class="hint">示例题库基于 Oracle Java 官方文档与 Spring Framework 官方文档整理，适合先跑通企业 Java 招聘测评流程。</p>
            <div id="questionBankList" class="question-list question-list-compact"></div>
          </div>
        </section>

        <section id="assessmentView" class="view">
          <div class="panel">
            <div class="panel-header">
              <h2>答题页</h2>
              <div class="inline-form">
                <input id="campaignIdInput" placeholder="输入 campaignId" />
                <button id="loadQuestionsButton" class="ghost-button">加载题目</button>
              </div>
            </div>
            <div id="assessmentMeta" class="meta-strip"></div>
            <form id="assessmentForm" class="question-list"></form>
          </div>
        </section>

        <section id="submissionView" class="view">
          <div class="panel">
            <div class="panel-header">
              <h2>提交详情</h2>
              <div class="inline-form">
                <input id="submissionIdInput" placeholder="输入 submissionId" />
                <button id="loadSubmissionButton" class="ghost-button">查询提交</button>
              </div>
            </div>
            <div id="submissionMeta" class="meta-strip"></div>
            <div id="submissionAnswers" class="question-list"></div>
          </div>
        </section>

        <section id="reviewView" class="view">
          <div class="panel">
            <div class="panel-header">
              <h2>人工评估</h2>
              <p class="hint">先在“提交详情”中加载记录，再切到本页评估主观题。</p>
            </div>
            <form id="evaluationForm" class="question-list"></form>
          </div>
        </section>
      </main>
    </div>

    <script src="./config.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
